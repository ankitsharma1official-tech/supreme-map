<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AETHER-NET | Mobile Optimizer</title>
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.maptiler.com/maptiler-geocoding-control/v1.3.3/maplibregl.umd.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-geocoding-control/v1.3.3/style.css" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #020202; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Fixed Mobile HUD */
        .hud-top { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 8px; border-left: 3px solid var(--neon); font-size: 12px; pointer-events: none; }
        
        /* Bottom Control Bar - Better for Thumbs */
        .bottom-nav { 
            position: absolute; bottom: 20px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 8px; z-index: 10;
            padding: 0 10px; box-sizing: border-box;
        }
        
        button { 
            background: rgba(17, 17, 17, 0.9); color: var(--neon); border: 1px solid var(--neon); 
            padding: 10px 12px; border-radius: 6px; font-size: 11px; font-weight: bold;
            flex: 1; max-width: 120px; text-transform: uppercase;
        }

        /* Shrink Search Bar for Mobile */
        .maplibregl-ctrl-geocoder { width: 180px !important; min-width: 180px !important; margin: 10px !important; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="hud-top">AETHER-OS: MOBILE v1.1<br><span id="status" style="color:var(--neon)">READY</span></div>

<div class="bottom-nav">
    <button onclick="toggleFollow()">Follow Me</button>
    <button onclick="map.setProjection({type:'globe'})">Globe</button>
    <button onclick="map.setProjection({type:'mercator'})">2D Map</button>
</div>

<script>
    const API_KEY = '6zP9RexeBTwxHcQlsSZT';
    let isFollowing = false;
    let watchId = null;

    const map = new maplibregl.Map({
        container: 'map',
        style: `https://api.maptiler.com/maps/hybrid/style.json?key=${API_KEY}`,
        center: [78.9, 20.5], zoom: 3, pitch: 45,
        fadeDuration: 200, // Faster tile loading
        performanceMetrics: true 
    });

    map.on('style.load', () => {
        // Reduced exaggeration for smoother mobile performance
        map.addSource('terrain', { type: 'raster-dem', url: `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${API_KEY}`, tileSize: 256 });
        map.setTerrain({ source: 'terrain', exaggeration: 1.0 });

        // Optimization: Only load buildings at very high zoom
        map.addLayer({
            'id': '3d-buildings', 'source': 'composite', 'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'], 'type': 'fill-extrusion', 'minzoom': 16,
            'paint': { 'fill-extrusion-color': '#555', 'fill-extrusion-height': ['get', 'height'], 'fill-extrusion-opacity': 0.5 }
        });
    });

    function toggleFollow() {
        if (!isFollowing) {
            isFollowing = true;
            document.getElementById('status').innerText = "TRACKING...";
            watchId = navigator.geolocation.watchPosition(pos => {
                map.flyTo({
                    center: [pos.coords.longitude, pos.coords.latitude],
                    zoom: 17, pitch: 70, essential: true, duration: 1500
                });
            }, null, { enableHighAccuracy: true });
        } else {
            isFollowing = false;
            navigator.geolocation.clearWatch(watchId);
            document.getElementById('status').innerText = "IDLE";
        }
    }

    const gc = new createMaptilerGeocodingControl({ apiKey: API_KEY, maplibregl: maplibregl });
    map.addControl(gc, 'top-right');
</script>
</body>
</html>
